<!doctype html>
<html lang="fi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>StudEat Login</title>
		<link rel="icon" href="../assets/favicon.png" type="image/png" />
		<link rel="stylesheet" href="../assets/styles/index.css" />
	</head>
	<body>
		<header class="header">
			<div class="header__content layout">
				<a class="header__logo" href="../index.html">
					STUD<span class="header__logo-accent">EAT</span>
				</a>

				<nav class="header__nav">
					<a class="header__nav-link" href="../index.html"
						>Restaurants</a
					>
					<a class="header__nav-link" href="./map.html">Map View</a>
				</nav>

				<a
					class="button button--square button--icon"
					href="./login.html"
				>
					☻
				</a>
			</div>
		</header>

		<main class="content auth-page">
			<section class="auth layout">
				<div class="auth__header hero__main hero__main--wide">
					<h1 class="hero__title">
						<span class="hero__title-line">Welcome Back</span>
						<span class="hero__title-line hero__title-line--pink">
							Let's Eat
						</span>
					</h1>
				</div>

				<div class="auth__content">
					<div class="auth__tabs">
						<button
							class="auth__tab auth__tab--active"
							id="login-tab"
							type="button"
						>
							Login
						</button>
						<button class="auth__tab" id="signup-tab" type="button">
							Sign Up
						</button>
						<span class="auth__sticker">Lunch time?</span>
					</div>

					<div class="auth__body">
						<form
							class="auth__form auth__form--active"
							id="login-form"
						>
							<label class="filters__group">
								<span class="filters__label">Email</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="email"
										name="email"
										placeholder="email@student.fi"
										autocomplete="email"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="auth__field-top">
									<span class="filters__label">Password</span>
									<a class="auth__link" href="#">Forgot?</a>
								</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="password"
										name="password"
										autocomplete="current-password"
									/>
								</span>
							</label>

							<label class="auth__check">
								<input
									class="auth__checkbox"
									type="checkbox"
									name="remember"
								/>
								<span class="auth__check-box"></span>
								<span class="auth__check-text"
									>Stay logged in on this device</span
								>
							</label>

							<button class="button auth__submit" type="submit">
								Login
							</button>

							<p class="auth__footer-text">
								New to STUDEAT?
								<button
									class="auth__switch"
									id="signup-switch"
									type="button"
								>
									Sign up
								</button>
							</p>
						</form>

						<form class="auth__form" id="signup-form">
							<label class="filters__group">
								<span class="filters__label">Full Name</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="text"
										name="name"
										placeholder="your name"
										autocomplete="name"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label">Email</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="email"
										name="signup-email"
										placeholder="email@student.fi"
										autocomplete="email"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label"
									>Create Password</span
								>
								<span class="filters__field">
									<input
										class="filters__control"
										type="password"
										name="signup-password"
										placeholder="create password"
										autocomplete="new-password"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label"
									>Repeat Password</span
								>
								<span class="filters__field">
									<input
										class="filters__control"
										type="password"
										name="signup-password-repeat"
										placeholder="repeat password"
										autocomplete="new-password"
									/>
								</span>
							</label>

							<label class="auth__check">
								<input
									class="auth__checkbox"
									type="checkbox"
									name="terms"
								/>
								<span class="auth__check-box"></span>
								<span class="auth__check-text"
									>I agree to the terms and privacy
									policy</span
								>
							</label>

							<button class="button auth__submit" type="submit">
								Sign Up
							</button>

							<p class="auth__footer-text">
								Already have an account?
								<button
									class="auth__switch"
									id="login-switch"
									type="button"
								>
									Login
								</button>
							</p>
						</form>
					</div>
				</div>
			</section>
		</main>

		<footer class="footer layout">
			<p class="footer__text">© 2026 Kseniia Shlenskaia</p>
		</footer>

		<nav class="toggle">
			<div class="toggle__frame">
				<a class="toggle__link" href="../index.html">Cards</a>
				<a class="toggle__link toggle__link--active" href="./map.html">
					Map View
				</a>
			</div>
		</nav>

		<script>
			const loginTab = document.getElementById('login-tab');
			const signupTab = document.getElementById('signup-tab');
			const loginForm = document.getElementById('login-form');
			const signupForm = document.getElementById('signup-form');
			const loginSwitch = document.getElementById('login-switch');
			const signupSwitch = document.getElementById('signup-switch');
			const profilePageUrl = './profile.html';

			const showLogin = () => {
				loginTab?.classList.add('auth__tab--active');
				signupTab?.classList.remove('auth__tab--active');
				loginForm?.classList.add('auth__form--active');
				signupForm?.classList.remove('auth__form--active');
			};

			const showSignup = () => {
				signupTab?.classList.add('auth__tab--active');
				loginTab?.classList.remove('auth__tab--active');
				signupForm?.classList.add('auth__form--active');
				loginForm?.classList.remove('auth__form--active');
			};

			loginTab?.addEventListener('click', showLogin);
			signupTab?.addEventListener('click', showSignup);
			loginSwitch?.addEventListener('click', showLogin);
			signupSwitch?.addEventListener('click', showSignup);
			loginForm?.addEventListener('submit', (event) => {
				event.preventDefault();
				window.location.href = profilePageUrl;
			});
			signupForm?.addEventListener('submit', (event) => {
				event.preventDefault();
				window.location.href = profilePageUrl;
			});
		</script>
	</body>
</html>
