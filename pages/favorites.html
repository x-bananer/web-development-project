<!doctype html>
<html lang="fi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>StudEat Favorites</title>
		<link rel="icon" href="../assets/favicon.png" type="image/png" />
		<link rel="stylesheet" href="../assets/styles/index.css" />
	</head>
	<body>
		<header class="header">
			<div class="header__content layout">
				<a class="header__logo" href="../index.html">
					STUD<span class="header__logo-accent">EAT</span>
				</a>

				<nav class="header__nav">
					<a class="header__nav-link" href="../index.html"
						>Restaurants</a
					>
					<a class="header__nav-link" href="./map.html">Map View</a>
					<a
						class="header__nav-link header__nav-link--active"
						href="./favorites.html"
						>My Favorites</a
					>
				</nav>

				<a class="button button--square button--icon" href="./login.html">
					☻
				</a>
			</div>
		</header>

		<main class="content">
			<section class="hero hero--favorites layout">
				<div class="hero__main hero__main--wide">
					<h1 class="hero__title">My Favorites</h1>
					<p class="hero__description hero__description--pink">
						Your saved fuel stations
					</p>
				</div>
			</section>

			<section class="catalog layout">
				<ul class="list">
					<li class="list__item">
						<article class="card" data-restaurant-url="./restaurant.html">
							<div class="card__media">
								<div class="card__badges">
									<span
										class="card__badge card__badge--yellow"
										>Helsinki</span
									>
									<span class="card__badge card__badge--pink"
										>Fazer</span
									>
								</div>
								<div class="card__favorite-icon">♥</div>
							</div>

							<div class="card__body">
								<h2 class="card__title">Metropolia Arabia</h2>
								<p class="card__address">
									Hameentie 135, Helsinki
								</p>
								<div class="card__tags">
									<span
										class="card__tag card__tag--blue"
									></span>
									<span
										class="card__tag card__tag--pink"
									></span>
								</div>
							</div>

							<button class="button button--view" type="button">
								✖ Remove From Favorites
							</button>
						</article>
					</li>

					<li class="list__item">
						<article class="card" data-restaurant-url="./restaurant.html">
							<div class="card__media">
								<div class="card__badges">
									<span
										class="card__badge card__badge--yellow"
										>Espoo</span
									>
									<span class="card__badge card__badge--blue"
										>Sodexo</span
									>
								</div>
								<div class="card__favorite-icon">♥</div>
							</div>

							<div class="card__body">
								<h2 class="card__title">Aalto Taffa</h2>
								<p class="card__address">Otakaari 22, Espoo</p>
								<div class="card__tags">
									<span
										class="card__tag card__tag--yellow"
									></span>
								</div>
							</div>

							<button class="button button--view" type="button">
								✖ Remove From Favorites
							</button>
						</article>
					</li>
				</ul>
			</section>
		</main>

		<footer class="footer layout">
			<p class="footer__text">© 2026 Kseniia Shlenskaia</p>
		</footer>

		<nav class="toggle">
			<div class="toggle__frame">
				<a
					class="toggle__link toggle__link--active"
					href="../index.html"
				>
					Cards
				</a>
				<a class="toggle__link" href="./map.html"> Map View </a>
				<a
					class="toggle__link toggle__link--icon"
					href="./favorites.html"
				>
					♥
				</a>
			</div>
		</nav>

		<script>
			const favoriteItems = document.querySelectorAll('.list__item');

			favoriteItems.forEach((item) => {
				item.addEventListener('click', (event) => {
					if (event.target.closest('.card__favorite-icon')) {
						return;
					}

					const card = item.querySelector('.card[data-restaurant-url]');

					if (!card) {
						return;
					}

					window.location.href = card.dataset.restaurantUrl;
				});
			});
		</script>
	</body>
</html>
