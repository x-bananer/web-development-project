<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>StudEat Profile</title>
		<link rel="icon" href="../../assets/favicon.png" type="image/png">
		<link rel="stylesheet" href="../../assets/styles/index.css">
		<script src="./index.js" defer></script>
	</head>
	<body>
		<header class="header">
			<div class="header__content layout">
				<a class="header__logo" href="../../index.html">
					STUD<span class="header__logo-accent">EAT</span>
				</a>

				<nav class="header__nav">
					<a class="header__nav-link" href="../../index.html"
						>Restaurants</a
					>
					<a
						class="header__nav-link"
						href="../../pages/map/index.html"
						>Map</a
					>
				</nav>

				<a
					class="button header-auth-button"
					href="../../pages/profile/index.html"
					data-login-href="../../pages/login/index.html"
					data-profile-href="../../pages/profile/index.html"
				>
					Login
				</a>
			</div>
		</header>

		<main class="content">
			<section class="hero layout">
				<div class="hero__main hero__main--wide">
					<h1 class="hero__title">
						<span class="hero__title-line">Settings</span>
					</h1>
				</div>
			</section>

			<div class="profile layout">
				<div class="profile__media">
					<div class="profile__avatar" id="profile-avatar">
						<img
							class="profile__avatar-image"
							id="profile-avatar-image"
							src="../../assets/favicon.png"
							alt="Profile avatar"
						>
					</div>
					<input
						id="profile-photo-input"
						type="file"
						accept="image/*"
						hidden
					>
					<button
						class="button profile__upload"
						id="profile-upload"
						type="button"
					>
						Upload Photo
					</button>
				</div>

				<form class="profile__form" id="profile-form">
					<label
						class="filters__group profile__field profile__field--wide"
					>
						<span class="filters__label">Username</span>
						<span class="filters__field">
							<input
								class="filters__control"
								type="text"
								name="username"
							>
						</span>
					</label>

					<label class="filters__group profile__field">
						<span class="filters__label">Email</span>
						<span class="filters__field">
							<input
								class="filters__control"
								type="email"
								name="email"
							>
						</span>
					</label>

					<label class="filters__group profile__field">
						<span class="filters__label">Password</span>
						<span class="filters__field">
							<input
								class="filters__control"
								type="password"
								name="password"
							>
						</span>
					</label>

					<p
						class="profile__message profile__field profile__field--wide"
						id="profile-message"
					></p>

					<button class="button profile__submit" type="submit">
						Update Details
					</button>

					<button
						class="button profile__logout"
						id="profile-logout"
						type="button"
					>
						Logout
					</button>
				</form>
			</div>
		</main>

		<footer class="footer layout">
			<p class="footer__text">© 2026 Kseniia Shlenskaia</p>
		</footer>
	</body>
</html>
