<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>StudEat Login</title>
		<link rel="icon" href="../../assets/favicon.png" type="image/png" />
		<link rel="stylesheet" href="../../assets/styles/index.css" />
		<script src="./index.js" defer></script>
	</head>
	<body>
		<header class="header">
			<div class="header__content layout">
				<a class="header__logo" href="../../index.html">
					STUD<span class="header__logo-accent">EAT</span>
				</a>

				<nav class="header__nav">
					<a class="header__nav-link" href="../../index.html"
						>Restaurants</a
					>
					<a
						class="header__nav-link"
						href="../../pages/map/index.html"
						>Map</a
					>
				</nav>

				<a
					class="button header-auth-button"
					href="../../pages/login/index.html"
					data-login-href="../../pages/login/index.html"
					data-profile-href="../../pages/profile/index.html"
				>
					Login
				</a>
			</div>
		</header>

		<main class="content auth-page">
			<section class="auth layout">
				<div class="auth__header hero__main hero__main--wide">
					<h1 class="hero__title">
						<span class="hero__title-line">Welcome Back</span>
						<span class="hero__title-line hero__title-line--pink">
							Let's Eat
						</span>
					</h1>
				</div>

				<div class="auth__content">
					<div class="auth__tabs">
						<button
							class="auth__tab auth__tab--active"
							id="login-tab"
							type="button"
						>
							Login
						</button>
						<button class="auth__tab" id="signup-tab" type="button">
							Sign Up
						</button>
					</div>

					<div class="auth__body">
						<form
							class="auth__form auth__form--active"
							id="login-form"
						>
							<label class="filters__group">
								<span class="filters__label">Username</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="text"
										name="username"
										autocomplete="username"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label">Password</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="password"
										name="password"
										autocomplete="current-password"
									/>
								</span>
							</label>

							<button class="button auth__submit" type="submit">
								Login
							</button>

							<p class="auth__message" id="login-message"></p>
						</form>

						<form class="auth__form" id="signup-form">
							<label class="filters__group">
								<span class="filters__label">Username</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="text"
										name="username"
										autocomplete="username"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label">Email</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="email"
										name="email"
										autocomplete="email"
									/>
								</span>
							</label>

							<label class="filters__group">
								<span class="filters__label">Password</span>
								<span class="filters__field">
									<input
										class="filters__control"
										type="password"
										name="password"
										autocomplete="new-password"
									/>
								</span>
							</label>

							<button class="button auth__submit" type="submit">
								Sign Up
							</button>

							<p class="auth__message" id="signup-message"></p>
						</form>
					</div>
				</div>
			</section>
		</main>

		<footer class="footer layout">
			<p class="footer__text">© 2026 Kseniia Shlenskaia</p>
		</footer>

		<nav class="toggle">
			<div class="toggle__frame">
				<a class="toggle__link" href="../../index.html">Restaurants</a>
				<a
					class="toggle__link toggle__link--active"
					href="../../pages/map/index.html"
				>
					Map
				</a>
			</div>
		</nav>
	</body>
</html>
