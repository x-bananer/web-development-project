<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">

		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>StudEat</title>

		<link rel="stylesheet" href="./assets/styles/index.css">
		<link rel="icon" href="./assets/favicon.png" type="image/png">

		<script src="./pages/main/index.js" defer></script>
	</head>
	<body>
		<header class="header">
			<div class="header__content layout">
				<a class="header__logo" href="./index.html">
					STUD<span class="header__logo-accent">EAT</span>
				</a>

				<nav class="header__nav">
					<a
						class="header__nav-link header__nav-link--active"
						href="./index.html"
					>
						Restaurants
					</a>
					<a class="header__nav-link" href="./pages/map/index.html"
						>Map</a
					>
				</nav>

				<a
					class="button header-auth-button"
					href="./pages/login/index.html"
					data-login-href="./pages/login/index.html"
					data-profile-href="./pages/profile/index.html"
				>
					Login
				</a>
			</div>
		</header>

		<main class="content">
			<section class="hero layout">
				<div class="hero__main">
					<h1 class="hero__title">
						<span class="hero__title-line">Student</span>
						<span class="hero__title-line hero__title-line--green"
							>Restaurants</span
						>
					</h1>
					<p class="hero__description">
						Browse student restaurants, compare
						<br>
						menus and prices, and choose where to eat.
					</p>
				</div>
			</section>

			<div class="filters layout">
				<form class="filters__box" id="filters">
					<p class="filters__mobile-label">Filters</p>
					<label class="filters__group filters__group--search">
						<span class="filters__label">Search restaurant</span>
						<span class="filters__field">
							<input
								id="filter-search"
								class="filters__control"
								type="text"
								placeholder="Enter restaurant name..."
							>
						</span>
					</label>

					<label class="filters__group">
						<span class="filters__label">City</span>
						<span class="filters__field filters__field--yellow">
							<select class="filters__control" id="filter-city">
								<option value="">All Cities</option>
							</select>
						</span>
					</label>

					<label class="filters__group">
						<span class="filters__label">Company</span>
						<span class="filters__field filters__field--pink">
							<select
								class="filters__control"
								id="filter-company"
							>
								<option value="">All Companies</option>
							</select>
						</span>
					</label>

					<button
						class="filters__button button button--reset"
						type="reset"
					>
						Reset
					</button>
				</form>
			</div>

			<div class="catalog layout">
				<ul class="list" id="cards-list">
					<!-- Cards will be inserted there -->
				</ul>
			</div>
		</main>

		<footer class="footer">
			<p class="footer__text layout">© 2026 Kseniia Shlenskaia</p>
		</footer>

		<nav class="toggle">
			<div class="toggle__frame">
				<a
					class="toggle__link toggle__link--active"
					href="./index.html"
				>
					Restaurants
				</a>
				<a class="toggle__link" href="./pages/map/index.html">Map</a>
			</div>
		</nav>


		<div class="modal" id="modal">
			<div class="modal__dialog">
				<div class="modal__head">
					<div class="modal__top">
						<h2 class="modal__title">Menu</h2>
						<button
							class="button button--square modal__close"
							id="modal-close"
							type="button"
						>
							✕
						</button>
					</div>
					<p class="modal__caption">Loading address...</p>
				</div>

				<div class="modal__tabs">
					<button
						class="modal__tab modal__tab--active"
						id="daily-tab"
						type="button"
					>
						Today's Menu
					</button>
					<button class="modal__tab" id="weekly-tab" type="button">
						Weekly Menu
					</button>
				</div>

				<div class="modal__body modal__panel modal__panel--active" id="daily-panel">
					<section class="modal__group">
						<h3 class="modal__group-title">Loading...</h3>
						<ul class="modal__list">
							<li class="list__stub">Loading...</li>
						</ul>
					</section>
				</div>

				<div class="modal__body modal__panel" id="weekly-panel">
					<div class="modal__stub">Loading...</div>
				</div>
			</div>
		</div>
	</body>
</html>
